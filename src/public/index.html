<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escarbato Petshop — Administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7BAE7F;
    --sage-light: #DDEEDB;
    --sage-dark: #4E8055;
    --amber: #F4A535;
    --amber-light: #FFF2D3;
    --amber-dark: #B96F12;
    --cream: #FDF8F0;
    --warm-white: #FFFDF9;
    --brown: #5C3D2E;
    --brown-light: #8B6150;
    --text: #2D2017;
    --text-soft: #7A6355;
    --border: #E8DDD0;
    --card: #FFFFFF;
    --danger: #D94B4B;
    --danger-light: #FDEAEA;
    --success: #4E9B69;
    --success-light: #E8F7EE;
    --sidebar-w: 260px;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(92,61,46,0.10);
    --shadow-lg: 0 8px 40px rgba(92,61,46,0.16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(circle at 18% 16%, rgba(244,165,53,0.14), transparent 28%),
      radial-gradient(circle at 82% 4%, rgba(123,174,127,0.16), transparent 30%),
      linear-gradient(135deg, #FFFDF9 0%, #FDF8F0 50%, #F7EDDF 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle, rgba(92,61,46,0.10) 0 1px, transparent 1.5px),
      radial-gradient(circle, rgba(123,174,127,0.12) 0 1px, transparent 1.5px);
    background-size: 86px 86px, 132px 132px;
    background-position: 10px 18px, 42px 58px;
    opacity: .45;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: linear-gradient(180deg, #FFFFFF 0%, #FFF8EB 100%);
    border-right: 1px solid var(--border);
    box-shadow: 8px 0 28px rgba(92,61,46,0.08);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
    transition: transform .3s ease;
  }

  .sidebar-logo {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    column-gap: 12px;
  }

  .logo-name {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--brown);
    text-shadow: none;
    line-height: 1;
  }
  .logo-sub {
    font-size: 0.72rem;
    color: var(--text-soft);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 0px;
  }
  .logo-paw {
    width: 64px;
    height: 64px;
    grid-row: 1 / span 2;
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(92,61,46,0.12));
  }

  .sidebar-nav { flex: 1; padding: 20px 14px; }

  .nav-section-label {
    font-size: .68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-soft);
    padding: 14px 10px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-soft);
    font-weight: 700;
    font-size: .92rem;
    transition: all .18s ease;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--sage-light); color: var(--sage-dark); }
  .nav-item.active {
    background: var(--sage-dark);
    color: #fff;
    box-shadow: 0 8px 18px rgba(78,128,85,0.20);
  }
  .nav-item.active .nav-icon { filter: brightness(1.4); }
  .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }

  .sidebar-footer {
    padding: 18px 24px;
    border-top: 1px solid var(--border);
    font-size: .78rem;
    color: var(--text-soft);
    text-align: center;
  }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: rgba(255,253,249,0.92);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(14px);
    box-shadow: 0 8px 24px rgba(92,61,46,0.08);
  }

  .topbar-title {
    font-family: 'Cinzel', serif;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--brown);
  }

  .topbar-right { display: flex; align-items: center; gap: 14px; }

  .hamburger {
    display: none;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--brown);
    padding: 6px;
  }

  .badge {
    background: var(--amber-light);
    color: var(--brown);
    font-size: .72rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 99px;
  }

  /* ── CONTENT ── */
  .content {
    padding: 32px;
    flex: 1;
  }

  /* ── SECTION ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── DASHBOARD ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 18px;
    border: 1px solid var(--border);
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stat-icon {
    width: 54px; height: 54px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .stat-icon.green { background: var(--success-light); }
  .stat-icon.amber { background: var(--amber-light); }
  .stat-icon.brown { background: #F5EDE8; }
  .stat-icon.blue { background: #E8F0FE; }

  .stat-info .stat-num {
    font-family: 'Inter Tight', sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--brown);
    line-height: 1;
  }
  .stat-info .stat-label {
    font-size: .8rem;
    color: var(--text-soft);
    font-weight: 600;
    margin-top: 4px;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .panel {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 800;
    color: var(--brown);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .alert-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    background: var(--danger-light);
    margin-bottom: 8px;
    font-size: .85rem;
    color: #A02020;
    font-weight: 700;
  }
  .alert-item .alert-icon { font-size: 1.1rem; }

  .recent-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: .86rem;
  }
  .recent-item:last-child { border-bottom: none; }
  .recent-name { font-weight: 700; color: var(--text); }
  .recent-sub { color: var(--text-soft); font-size: .78rem; }
  .tag { font-size: .72rem; font-weight: 800; padding: 3px 10px; border-radius: 99px; }
  .tag-green { background: var(--success-light); color: var(--success); }
  .tag-amber { background: var(--amber-light); color: var(--amber-dark); }
  .tag-red { background: var(--danger-light); color: var(--danger); }

  .audit-panel { width: 100%; }
  .audit-list { display: grid; gap: 10px; }
  .audit-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--cream);
  }
  .audit-main {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .audit-main strong { color: var(--brown); white-space: nowrap; }
  .audit-main span:last-child {
    color: var(--text-soft);
    font-size: .86rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .audit-item time {
    color: var(--text-soft);
    font-size: .78rem;
    font-weight: 800;
    white-space: nowrap;
  }
  .audit-action {
    display: inline-flex;
    align-items: center;
    border-radius: 99px;
    padding: 4px 10px;
    font-size: .72rem;
    font-weight: 900;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .audit-create { background: #DFF3E6; color: #236B3B; border-color: #A9D8B8; }
  .audit-edit { background: #FFF0CF; color: #8A5A00; border-color: #D7A84C; }
  .audit-delete { background: #FAD6D6; color: #9A2525; border-color: #E8A2A2; }

  /* ── ABM SECTION ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-heading {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--brown);
    text-shadow: none;
  }
  .section-heading span { color: var(--sage-dark); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: .88rem;
    cursor: pointer;
    border: none;
    transition: all .18s ease;
  }
  .btn-primary { background: var(--sage-dark); color: #fff; }
  .btn-primary:hover { background: var(--sage); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(78,128,85,.3); }
  .btn-amber { background: var(--amber); color: var(--brown); }
  .btn-amber:hover { background: var(--amber-dark); color: #fff; transform: translateY(-1px); }
  .btn-danger { background: var(--danger-light); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-ghost { background: var(--cream); color: var(--text-soft); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); color: var(--text); }
  .btn:disabled {
    cursor: wait;
    opacity: .72;
    pointer-events: none;
    transform: none;
    box-shadow: none;
  }
  .btn.is-loading { justify-content: center; }
  .loading-spinner {
    width: 1em;
    height: 1em;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    flex: 0 0 auto;
    animation: spin .65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-sm { padding: 6px 14px; font-size: .8rem; }
  .btn-icon {
    width: 34px;
    height: 34px;
    padding: 0;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── SEARCH/FILTER BAR ── */
  .toolbar {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 180px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: .9rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border .18s;
  }
  .search-box input:focus { border-color: var(--sage-dark); box-shadow: 0 0 0 3px rgba(78,128,85,.12); }
  .search-box .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: 1rem; color: var(--text-soft); pointer-events: none;
  }
  .filter-control {
    min-width: 160px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: .9rem;
    background: var(--card);
    color: var(--text);
    outline: none;
  }
  .filter-control:focus {
    border-color: var(--sage-dark);
    box-shadow: 0 0 0 3px rgba(78,128,85,.12);
  }
  .filter-field {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-soft);
    font-size: .78rem;
    font-weight: 800;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .filter-field .filter-control { min-width: 145px; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: auto;
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; }
  .data-table { min-width: 920px; }
  thead { background: var(--cream); }
  thead th {
    padding: 13px 18px;
    text-align: left;
    font-size: .78rem;
    font-weight: 800;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  tbody tr {
    border-top: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:hover { background: #FAFAF7; }
  tbody td { padding: 13px 18px; font-size: .88rem; }

  .data-table th:last-child,
  .data-table td:last-child {
    position: sticky;
    right: 0;
    width: 144px;
    min-width: 144px;
    background: var(--card);
    box-shadow: -10px 0 18px rgba(92,61,46,0.08);
  }
  .data-table th:last-child { z-index: 3; }
  .data-table td:last-child { z-index: 2; }
  .data-table thead th:last-child { background: var(--cream); }
  .data-table tbody tr:hover td:last-child { background: #FAFAF7; }

  .td-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .price-value {
    color: var(--success);
    font-weight: 800;
  }

  .inline-table-input {
    width: 110px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--warm-white);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: .84rem;
    font-weight: 800;
    outline: none;
  }
  .inline-table-input:focus {
    border-color: var(--sage-dark);
    box-shadow: 0 0 0 3px rgba(78,128,85,.12);
  }

  .detail-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .detail-list div {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .detail-list span {
    display: block;
    font-size: .74rem;
    font-weight: 800;
    color: var(--text-soft);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .detail-list strong { color: var(--brown); overflow-wrap: anywhere; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-weight: 600; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    animation: modalIn .22s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-wide { max-width: 760px; }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.95) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--brown);
    margin-bottom: 22px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-close {
    background: none; border: none; font-size: 1.4rem;
    cursor: pointer; color: var(--text-soft); line-height: 1;
    padding: 2px 6px; border-radius: 6px;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  /* ── FORM ── */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: .82rem;
    font-weight: 800;
    color: var(--text-soft);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: .92rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border .18s, box-shadow .18s, background .18s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--sage-dark);
    background: var(--card);
    box-shadow: 0 0 0 3px rgba(78,128,85,.12);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 26px;
  }

  /* ── STOCK ── */
  .stock-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: transform .2s, box-shadow .2s;
    margin-bottom: 14px;
  }
  .stock-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stock-prod-info { flex: 1; }
  .stock-prod-name { font-weight: 800; color: var(--text); font-size: .95rem; }
  .stock-prod-type { font-size: .78rem; color: var(--text-soft); margin-top: 2px; }
  .stock-controls {
    display: flex; align-items: center; gap: 10px;
  }
  .stock-qty {
    font-family: 'Inter Tight', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--brown);
    background: #FFF7E8;
    border: 1px solid #E8C98D;
    border-radius: 12px;
    min-width: 64px;
    padding: 5px 10px;
    text-align: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
  }
  .stock-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .stock-btn.minus { background: var(--danger-light); color: var(--danger); }
  .stock-btn.minus:hover { background: var(--danger); color: #fff; }
  .stock-btn.plus { background: var(--success-light); color: var(--sage-dark); }
  .stock-btn.plus:hover { background: var(--sage-dark); color: #fff; }
  .stock-btn:disabled {
    cursor: wait;
    opacity: .72;
    pointer-events: none;
  }

  .stock-status { min-width: 96px; text-align: right; }

  /* ── VENTAS ── */
  .sale-product-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 18px;
  }
  .sale-add-action { display: flex; align-items: flex-end; }
  .sale-add-action .btn { width: 100%; justify-content: center; }
  .sale-cart-wrap { margin-bottom: 18px; box-shadow: none; }
  .sale-empty { padding: 22px; }
  .sale-totals {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 18px;
    align-items: end;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .sale-totals span {
    display: block;
    font-size: .78rem;
    font-weight: 800;
    color: var(--text-soft);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sale-totals strong {
    font-family: 'Inter Tight', sans-serif;
    font-size: 1.8rem;
    color: var(--brown);
  }
  .sale-totals .form-group { margin-bottom: 0; }
  .sale-detail-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }
  .sale-detail-grid div {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .sale-detail-grid span {
    display: block;
    font-size: .74rem;
    font-weight: 800;
    color: var(--text-soft);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sale-detail-grid strong { color: var(--brown); }

  .chip {
    font-size: .75rem; font-weight: 800;
    padding: 4px 12px; border-radius: 99px;
    display: inline-block;
    border: 1px solid transparent;
  }
  .chip-ok { background: #DFF3E6; color: #236B3B; border-color: #A9D8B8; }
  .chip-low { background: #FFF0CF; color: #8A5A00; border-color: #D7A84C; }
  .chip-out { background: #FAD6D6; color: #9A2525; border-color: #E8A2A2; }

  /* ── TOAST ── */
  .toast-container {
    position: fixed; bottom: 28px; right: 28px;
    z-index: 9999;
    display: flex; flex-direction: column; gap: 10px;
  }
  .toast {
    background: var(--brown);
    color: #fff;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: .88rem;
    box-shadow: var(--shadow-lg);
    animation: toastIn .25s ease;
    display: flex; align-items: center; gap: 10px;
    min-width: 250px;
  }
  .toast.success { background: var(--sage-dark); }
  .toast.error { background: var(--danger); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── MOBILE OVERLAY ── */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .dashboard-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 700px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-overlay.open { display: block; }
    .main { margin-left: 0; }
    .hamburger { display: flex; }
    .content { padding: 20px 16px; }
    .topbar { padding: 0 16px; }
    .filter-control { flex: 1; min-width: 140px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    table { font-size: .82rem; }
    thead th, tbody td { padding: 10px 12px; }
    .modal { padding: 22px; }
    .stock-card { flex-wrap: wrap; }
    .sale-totals { grid-template-columns: 1fr; }
    .sale-detail-grid { grid-template-columns: 1fr; }
    .detail-list { grid-template-columns: 1fr; }
    .audit-item { align-items: flex-start; flex-direction: column; }
    .audit-main { align-items: flex-start; flex-direction: column; }
    .audit-main span:last-child { white-space: normal; }
  }

  @media (max-width: 420px) {
    .stats-grid { grid-template-columns: 1fr; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
